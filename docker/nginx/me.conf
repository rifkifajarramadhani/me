server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets (parity with the old Caddy `encode gzip`)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 256;

    # Traefik/Docker healthcheck target
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # Astro is built with trailingSlash: 'always' → directory-style pages.
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}
