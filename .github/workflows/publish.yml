name: deploy-me
on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: "deploy-me"
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/rifkifajarramadhani/me
  SITE_URL: https://rifkiramadhani.my.id
  BASE_PATH: /

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun - Install dependencies
        uses: ./.github/workflows/setup-bun

      - name: Build with Astro
        run: bun run build
        env:
          SITE_URL: ${{ env.SITE_URL }}
          BASE_PATH: ${{ env.BASE_PATH }}

      - name: Verify SEO artifacts
        run: |
          test -f dist/sitemap-index.xml
          grep -q 'https://rifkiramadhani.my.id/sitemap-index.xml' dist/robots.txt
          grep -q 'rel="canonical" href="https://rifkiramadhani.my.id/"' dist/index.html

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            SITE_URL=${{ env.SITE_URL }}
            BASE_PATH=${{ env.BASE_PATH }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: ~/deploy-me.sh ${{ github.sha }}
