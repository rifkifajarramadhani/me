name: publish-to-github-pages
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun - Install dependencies
        uses: ./.github/workflows/setup-bun

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Astro
        run: bun run build

      - name: Verify SEO artifacts
        run: |
          test -f dist/sitemap-index.xml
          grep -q 'https://rifkifajarramadhani.github.io/me/sitemap-index.xml' dist/robots.txt
          grep -q 'rel="canonical" href="https://rifkifajarramadhani.github.io/me/"' dist/index.html
          ! grep -q '<loc>https://rifkifajarramadhani.github.io/me</loc>' dist/sitemap-0.xml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
